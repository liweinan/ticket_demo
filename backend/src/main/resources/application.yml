# ============================================================
# 多租户订票 SaaS Demo - 后端配置
# ============================================================

spring:
  application:
    name: ticket-saas-demo

  # H2 内存数据库（共享表 + tenant_id 模式）
  datasource:
    url: jdbc:h2:mem:ticketdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        # 与 PostgreSQL jsonb 扩展字段设计对齐（H2 用 JSON 类型模拟）
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080

# Snowflake 工作节点 ID（分布式部署时每实例不同）
ticket:
  snowflake:
    worker-id: ${SNOWFLAKE_WORKER_ID:1}
    datacenter-id: ${SNOWFLAKE_DATACENTER_ID:1}

logging:
  level:
    com.demo.ticket: INFO
