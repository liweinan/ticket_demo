# ============================================================
# 多租户订票 SaaS Demo - 后端配置
# 默认连接 localhost PostgreSQL + Redis；Docker Compose 通过环境变量覆盖
# ============================================================

spring:
  application:
    name: ticket-saas-demo

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticketdb}
    username: ${SPRING_DATASOURCE_USERNAME:ticket}
    password: ${SPRING_DATASOURCE_PASSWORD:ticket}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3000ms

server:
  port: 8080

ticket:
  snowflake:
    worker-id: ${SNOWFLAKE_WORKER_ID:1}
    datacenter-id: ${SNOWFLAKE_DATACENTER_ID:1}

logging:
  level:
    com.demo.ticket: INFO
