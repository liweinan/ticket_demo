spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
      config:
        server-addr: ${NACOS_SERVER:localhost:8848}
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://frontend:5173"
              - "http://host.docker.internal:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders:
              - "X-Tenant-ID"

server:
  port: ${SERVER_PORT:8080}

tenant:
  rate-limit:
    gold: 100
    silver: 30
    bronze: 10
    default-qps: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.demo.ticket: INFO
    org.springframework.cloud.gateway: INFO
