global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ticket-demo
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway-service:8080
          - tenant-service:8081
          - event-service:8082
          - order-service:8083
          - audit-service:8084
        labels:
          env: demo
